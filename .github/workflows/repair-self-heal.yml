name: repair self-heal failed clusters

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Dispatch retry jobs instead of printing candidates"
        required: true
        default: false
        type: boolean
      max_jobs:
        description: "Maximum failed latest jobs to retry"
        required: true
        default: "5"
        type: string
      max_age_hours:
        description: "Only retry failed latest jobs published within this age"
        required: true
        default: "6"
        type: string
      runner:
        description: "Runner label for retried cluster workers"
        required: true
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      execution_runner:
        description: "Runner label for retried fix/apply execution work"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: clawsweeper-repair-self-heal
  cancel-in-progress: false

jobs:
  self-heal:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 20
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || github.repository_owner }}
          permission-actions: write
          permission-contents: write

      - uses: actions/checkout@v7
        with:
          filter: blob:none
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        id: setup-self-heal-state
        with:
          token: ${{ steps.state-token.outputs.token }}

      - uses: ./.github/actions/setup-pnpm
        id: setup-self-heal-pnpm
        with:
          build-script: build:repair

      - uses: ./.github/actions/setup-action-ledger
        id: setup-self-heal-ledger

      - name: Self-heal failed cluster runs
        id: self-heal-failed-runs
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_ALLOW_EXECUTE: ${{ vars.CLAWSWEEPER_ALLOW_EXECUTE || '0' }}
          CLAWSWEEPER_ALLOW_FIX_PR: ${{ vars.CLAWSWEEPER_ALLOW_FIX_PR || '0' }}
          CLAWSWEEPER_MODEL: internal
          CLAWSWEEPER_WORKER_RUNNER: ${{ vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
          CLAWSWEEPER_EXECUTION_RUNNER: ${{ vars.CLAWSWEEPER_EXECUTION_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
          CLAWSWEEPER_SELF_HEAL_MAX_ATTEMPTS_PER_JOB: ${{ vars.CLAWSWEEPER_SELF_HEAL_MAX_ATTEMPTS_PER_JOB || '3' }}
        run: |
          execute="false"
          max_jobs="${{ github.event_name == 'workflow_dispatch' && inputs.max_jobs || vars.CLAWSWEEPER_SELF_HEAL_MAX_JOBS || '5' }}"
          max_age_hours="${{ github.event_name == 'workflow_dispatch' && inputs.max_age_hours || vars.CLAWSWEEPER_SELF_HEAL_MAX_AGE_HOURS || '6' }}"
          if { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.execute }}" = "true" ]; } ||
             { [ "${{ github.event_name }}" = "schedule" ] && [ "${{ vars.CLAWSWEEPER_SELF_HEAL_EXECUTE || '0' }}" = "1" ]; }; then
            execute="true"
          fi

          args=(--max-jobs "$max_jobs" --max-age-hours "$max_age_hours" --wait-for-capacity)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            args+=(--runner "${{ inputs.runner }}" --execution-runner "${{ inputs.execution_runner }}")
          fi
          if [ "$execute" = "true" ]; then
            args+=(--execute)
          fi
          pnpm run repair:self-heal -- "${args[@]}"

      - name: Finalize self-heal dispatch action ledger
        if: ${{ always() && steps.setup-self-heal-state.outcome == 'success' && steps.setup-self-heal-pnpm.outcome == 'success' && steps.setup-self-heal-ledger.outcome == 'success' }}
        run: |
          set -euo pipefail
          : "${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          mkdir -p .artifacts
          node dist/repair/dispatch-action-ledger-cli.js finalize \
            --lane self-heal-dispatch \
            --allow-empty \
            > .artifacts/self-heal-dispatch-action-ledger-manifest.json

      - name: Publish self-heal dispatch action ledger
        if: ${{ always() && steps.setup-self-heal-state.outcome == 'success' && steps.setup-self-heal-pnpm.outcome == 'success' && steps.setup-self-heal-ledger.outcome == 'success' }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          source_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          manifest_file=".artifacts/self-heal-dispatch-action-ledger-manifest.json"
          if [ ! -s "$manifest_file" ]; then
            echo "No self-heal dispatch action events to publish."
            exit 0
          fi
          event_paths_file=".artifacts/self-heal-dispatch-action-ledger-paths.txt"
          import_result_file=".artifacts/self-heal-dispatch-action-ledger-import.json"
          node dist/repair/dispatch-action-ledger-cli.js publish \
            --lane self-heal-dispatch \
            --manifest "$manifest_file" \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
          if ! jq -e --slurpfile manifest "$manifest_file" \
            '.eventPaths == $manifest[0].event_paths' \
            "$import_result_file" >/dev/null; then
            echo "Imported self-heal dispatch paths do not match the finalized manifest." >&2
            exit 1
          fi
          jq -r '.paths[]?' "$import_result_file" |
            sort -u > "$event_paths_file"
          if [ ! -s "$event_paths_file" ]; then
            echo "Self-heal dispatch shards existed but no paths were imported." >&2
            exit 1
          fi
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
          done < "$event_paths_file"
          node dist/clawsweeper.js publish-action-event-paths \
            --paths-file "$event_paths_file" \
            --message "chore: append self-heal dispatch action ledger"

      - name: Commit self-heal ledger
        if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.execute) || (github.event_name == 'schedule' && vars.CLAWSWEEPER_SELF_HEAL_EXECUTE == '1')) }}
        run: |
          if [ ! -f results/self-heal.json ]; then
            echo "No self-heal ledger"
            exit 0
          fi
          pnpm run repair:publish-main -- \
            --message "chore: record self-heal dispatch" \
            --path results/self-heal.json \
            --rebase-strategy theirs
