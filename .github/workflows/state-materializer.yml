name: Materialize queued state

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: clawsweeper-state-materializer
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

env:
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

jobs:
  materialize:
    name: Drain queued state into one commit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Priority intent wins a slot quickly; a long acquire budget just lets one
      # contended wait eat the whole run (observed: six consecutive 20-min
      # timeout-cancels while the append window grew to ~25k rows).
      CLAWSWEEPER_STATE_LEASE_ACQUIRE_TIMEOUT_MS: "300000"
      CLAWSWEEPER_STATE_LEASE_PRIORITY: "1"
      CLAWSWEEPER_STATE_MATERIALIZER_MAX_RUNTIME_MS: "2400000"
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          fetch-depth: 1
          persist-credentials: false

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          coordinator-enabled: ${{ vars.CLAWSWEEPER_STATE_COORDINATOR_ENABLED || 'false' }}
          coordinator-url: ${{ vars.CLAWSWEEPER_EXACT_REVIEW_QUEUE_URL || 'https://clawsweeper.openclaw.ai' }}
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Materialize queued state
        env:
          CLAWSWEEPER_STATE_REPO_TOKEN: ${{ steps.state-token.outputs.token }}
          CLAWSWEEPER_WEBHOOK_SECRET: ${{ secrets.CLAWSWEEPER_WEBHOOK_SECRET }}
          QUEUE_URL: ${{ vars.CLAWSWEEPER_EXACT_REVIEW_QUEUE_URL || 'https://clawsweeper.openclaw.ai' }}
        run: node dist/repair/state-materializer.js
